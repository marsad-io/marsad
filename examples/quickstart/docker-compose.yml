# Quickstart backends: a local Prometheus that scrapes itself, so
# query_metrics has real data, and a local Loki for search_logs (push a line
# via the curl command in the README). Marsad itself runs on your host via
# `go run` - see README.
services:
  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
  loki:
    image: grafana/loki:3.1.0
    ports:
      - "3100:3100"
